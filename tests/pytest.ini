[pytest]
# Unit and contract tests for ForgeMT's first-party Lambdas and offline IaC
# wiring. Pure Python + moto only; no Docker, no live AWS.
testpaths =
    lambdas
    iac
    quality
    mutation
# Repo convention (pre-commit name-tests-test) is the <name>_test.py suffix.
python_files = *_test.py
python_functions = test_*
# Keep pytest out of vendored Terraform module copies, which contain their own
# unrelated test_*.py files.
norecursedirs = .terraform .git .hypothesis *.egg-info smoke
addopts = -ra --strict-markers --cov --cov-report=term-missing --cov-report=xml
markers =
    isolation: tenant-isolation regression tests (cross-tenant must be impossible)
    security: security-boundary tests (webhook signature, secret hygiene)
    contract: offline Terraform/Python interface tests
    fuzz: deterministic property and mutation tests for untrusted payload parsing
    mutation: deterministic source-mutation tests for critical security logic
filterwarnings =
    # surface the "verifier not wired" warning loudly instead of hiding it
    always

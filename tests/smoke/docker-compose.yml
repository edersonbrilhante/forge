---
# MiniStack for Forge smoke tests: a token-free, LocalStack-compatible AWS
# emulator on :4566. No account, no auth token.
#   docker compose up -d
# Override/pin the tag via MINISTACK_IMAGE. The '-full' image bundles Lambda,
# which the real-handler exec test needs.
#
# To block a caller (CI, Make, local dev) until MiniStack is answering, run:
#   docker compose up --wait
# --wait exits 0 when every service reports healthy, non-zero on timeout /
# crash. The healthcheck below waits until MiniStack's STS-compatible endpoint
# answers through the AWS CLI before pytest starts.
services:
  ministack:
    image: ${MINISTACK_IMAGE:-ministackorg/ministack:1.4.5-full@sha256:370e75bf6037cacb8969e12d3109f288e7e331420562ff94a36f714544b27789}
    container_name: forge-ministack
    ports:
      - 127.0.0.1:4566:4566
    volumes:
      # Needed only for the lambda_exec smoke test (MiniStack spawns a container
      # per function via the host Docker socket). Safe to drop for plumbing-only.
      - /var/run/docker.sock:/var/run/docker.sock
    # MiniStack does not expose LocalStack's /_localstack/health endpoint.
    # Budget: 60 * 2s = ~2min after start_period.
    healthcheck:
      test: [CMD-SHELL, aws sts get-caller-identity --endpoint-url http://localhost:4566 --region us-east-1 --no-sign-request || exit 1]
      interval: 2s
      timeout: 3s
      retries: 60
      start_period: 5s

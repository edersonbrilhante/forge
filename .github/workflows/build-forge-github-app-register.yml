---
# yamllint disable rule:comments
# yamllint disable rule:truthy
name: Docker image [forge-github-app-register]

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - .docker/forge-github-app-register/**
      - .github/workflows/build-forge-github-app-register.yml
      - pyproject.toml
      - uv.lock
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - renovatebot
    paths:
      - .docker/forge-github-app-register/**
      - .github/workflows/build-forge-github-app-register.yml
      - pyproject.toml
      - uv.lock

permissions: {} # Default deny; jobs declare only the permissions they need.

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

env:
  PLATFORMS: linux/amd64
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-forge-github-app-register

jobs:
  build-and-push-image:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required to checkout the repository.
      packages: write # Required to publish container images to GHCR.

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image [forge-github-app-register]
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: .docker/forge-github-app-register/Dockerfile
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ github.event_name == 'pull_request' && format('{0}/{1}:pr-test-{2}', env.REGISTRY, env.IMAGE_NAME, github.sha) || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test PR image [forge-github-app-register]
        if: github.event_name == 'pull_request'
        env:
          PR_TEST_IMAGE: ${{ format('{0}/{1}:pr-test-{2}', env.REGISTRY, env.IMAGE_NAME, github.sha) }}
        run: |
          set -euo pipefail

          container_id="$(docker run --detach --publish 5000:5000 "${PR_TEST_IMAGE}")"
          cleanup() {
              docker rm --force "${container_id}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 30); do
              if curl --fail --silent --show-error http://localhost:5000/ >/dev/null; then
                  exit 0
              fi
              sleep 2
          done

          docker logs "${container_id}" || true
          curl --fail --verbose http://localhost:5000/

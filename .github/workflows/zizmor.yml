---
# yamllint disable rule:comments
# yamllint disable rule:truthy
name: GitHub Actions Security Analysis

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/*.ya?ml
  pull_request:
    paths:
      - .github/workflows/*.ya?ml

permissions: {} # Default deny; jobs declare only the permissions they need.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  zizmor:
    name: Run zizmor
    runs-on: ubuntu-latest
    permissions:
      actions: read # Required so zizmor can inspect workflow metadata.
      contents: read # Required to checkout repository content.
      security-events: write # Required to upload zizmor SARIF results to code scanning.
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          persona: pedantic

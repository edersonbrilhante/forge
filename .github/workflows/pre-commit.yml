---
# yamllint disable rule:comments
# yamllint disable rule:truthy
name: Pre-commit Code Quality Checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - renovatebot
  push:
    branches:
      - main

permissions:
  contents: read # Required to checkout and lint the repository.

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  run-pre-commit:
    name: Run pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ghcr.io/cisco-open/forge-pre-commit:main@sha256:0977ced8cd79d5b26a22ff39edd44469379d7e75642f66209a9df43e032a4116

    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Cache Pre-commit
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pre-commit/
          key: pre-commit|${{ github.repository }}|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Cache OpenTofu providers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /github/home/.terraform.d/plugin
          key: tf-providers-${{ github.run_id }}
          restore-keys: |
            tf-providers

      - name: Set Terraform plugin cache
        run: echo "TF_PLUGIN_CACHE_DIR=/github/home/.terraform.d/plugin" >> $GITHUB_ENV

      - name: Mark repository as safe
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run pre-commit in all files
        shell: bash
        run: |
          set -o pipefail
          pre-commit run --show-diff-on-failure --color=always --all-files | tee pre-commit.log

      - name: Upload pre-commit log
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pre-commit-log
          path: pre-commit.log
          if-no-files-found: ignore

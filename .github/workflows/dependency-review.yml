---
# yamllint disable rule:comments
# yamllint disable rule:truthy
name: Dependency Review

on:
  pull_request:
    branches:
      - main

permissions: {} # Default deny; jobs declare only the permissions they need.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dependency-review:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required to read dependency manifests from the checkout.
      pull-requests: write # Required to publish the dependency review summary comment.
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          comment-summary-in-pr: always

---
# yamllint disable rule:comments
# yamllint disable rule:truthy
name: MiniStack Smoke

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
      - renovatebot
    paths:
      - modules/**/lambda/**
      - tests/smoke/**
      - scripts/ci_summary.py
      - .github/workflows/ministack-smoke.yml
  push:
    branches:
      - main
    paths:
      - modules/**/lambda/**
      - tests/smoke/**
      - scripts/ci_summary.py
      - .github/workflows/ministack-smoke.yml

permissions: {} # Default deny; jobs declare only the permissions they need.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    name: MiniStack smoke + real-handler exec
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read # Required to checkout repository content.
      issues: write # Required to create or update sticky PR summary comments.
      pull-requests: write # Required to publish summaries back to pull requests.
    env:
      AWS_ENDPOINT_URL: http://localhost:4566
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      # Fail (don't skip) if the emulator is down, so the job can't pass vacuously.
      FORGE_REQUIRE_MINISTACK: '1'
      # MiniStack: a token-free, LocalStack-compatible emulator on :4566. The
      # '-full' image bundles Lambda, needed by the real-handler exec test.
      MINISTACK_IMAGE: ministackorg/ministack:1.3.72-full@sha256:fda44c46c4cec06cd6774ce794eb68d5ab7e57a2ecb731fe7e7dda37fc2486be
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: 0.11.31

      - name: Start MiniStack
        working-directory: tests/smoke
        run: docker compose up --wait

      - name: Smoke plumbing tests
        working-directory: tests/smoke
        run: |
          uv run --project ../.. --locked --only-group smoke-tests \
            pytest -m smoke -q --junitxml=smoke-results.xml

      - name: Real-handler lambda execution
        working-directory: tests/smoke
        run: |
          uv run --project ../.. --locked --only-group smoke-tests \
            pytest -m lambda_exec -q --junitxml=lambda-exec-results.xml

      - name: Write MiniStack smoke summary
        if: always()
        working-directory: tests/smoke
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python ../../scripts/ci_summary.py \
            --title "MiniStack smoke + real-handler exec" \
            --junit "Smoke plumbing tests=smoke-results.xml" \
            --junit "Real-handler lambda execution=lambda-exec-results.xml" \
            --output ministack-smoke-summary.md \
            --comment-marker forge-ci-summary:ministack-smoke

      - name: MiniStack logs (on failure)
        if: failure()
        working-directory: tests/smoke
        run: docker compose logs --tail 200

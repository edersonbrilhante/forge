---
# yamllint disable rule:comments
# yamllint disable rule:truthy
name: Lambda Unit Tests

on:
  pull_request:
    branches:
      - main
      - renovatebot
    paths:
      - modules/**/lambda/**
      - tests/conftest.py
      - tests/pytest.ini
      - tests/lambdas/**
      - tests/support/**
      - scripts/ci_summary.py
      - pyproject.toml
      - uv.lock
      - .github/workflows/lambda-tests.yml
  push:
    branches:
      - main
    paths:
      - modules/**/lambda/**
      - tests/conftest.py
      - tests/pytest.ini
      - tests/lambdas/**
      - tests/support/**
      - scripts/ci_summary.py
      - pyproject.toml
      - uv.lock
      - .github/workflows/lambda-tests.yml

permissions: {} # Default deny; jobs declare only the permissions they need.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  unit-tests:
    name: Lambda unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read # Required to checkout repository content.
      issues: write # Required to create or update sticky PR summary comments.
      pull-requests: write # Required to publish summaries back to pull requests.
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          # Match the lambda runtime (python3.12) so imports/behaviour parity.
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: 0.11.28

      - name: Run unit tests
        working-directory: tests
        run: uv run --project .. --locked --only-group lambda-tests pytest -q lambdas --junitxml=pytest-results.xml

      - name: Write unit test summary
        if: always()
        working-directory: tests
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python ../scripts/ci_summary.py \
            --title "Lambda unit tests" \
            --junit "Lambda unit tests=pytest-results.xml" \
            --coverage coverage.xml \
            --output lambda-test-summary.md \
            --comment-marker forge-ci-summary:lambda-unit-tests

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lambda-test-results
          path: |
            tests/coverage.xml
            tests/pytest-results.xml
            tests/lambda-test-summary.md
          if-no-files-found: ignore

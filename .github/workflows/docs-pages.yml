---
# yamllint disable rule:comments
# yamllint disable rule:truthy
name: Publish Documentation

on:
  pull_request:
    paths:
      - .github/workflows/docs-pages.yml
      - docs/**
      - mkdocs.yaml
      - requirements-docs.txt
  push:
    branches:
      - main
    paths:
      - .github/workflows/docs-pages.yml
      - docs/**
      - mkdocs.yaml
      - requirements-docs.txt
      - README.md
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  validate-docs:
    name: Validate MkDocs site
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.x

      - name: Cache pip packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: docs-pip-${{ runner.os }}-${{ hashFiles('requirements-docs.txt') }}
          restore-keys: |
            docs-pip-${{ runner.os }}-

      - name: Install MkDocs dependencies
        run: python -m pip install --requirement requirements-docs.txt

      - name: Build documentation
        run: mkdocs build --strict --clean --site-dir site

  publish-docs:
    name: Build Pages artifact
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required to checkout repository content.
      pages: write # Required to upload the GitHub Pages artifact.
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.x

      - name: Cache pip packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: docs-pip-${{ runner.os }}-${{ hashFiles('requirements-docs.txt') }}
          restore-keys: |
            docs-pip-${{ runner.os }}-

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install MkDocs dependencies
        run: python -m pip install --requirement requirements-docs.txt

      - name: Build documentation
        run: mkdocs build --strict --clean --site-dir site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy-docs:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: publish-docs
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for GitHub Pages OIDC deployment.
      pages: write # Required to deploy the GitHub Pages site.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages site
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

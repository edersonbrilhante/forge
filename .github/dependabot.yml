---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      github-actions-dependencies:
        patterns:
          - '*'
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: uv
    directories:
      - /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      python-dependencies:
        patterns:
          - '*'
    labels:
      - dependencies
      - python

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      pre-commit-dependencies:
        patterns:
          - '*'
    labels:
      - dependencies
      - pre-commit

  - package-ecosystem: terraform
    directory: /modules
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      terraform-modules-dependencies:
        patterns:
          - '*'
    labels:
      - dependencies
      - terraform

  - package-ecosystem: terraform
    directory: /examples/deployments
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      terraform-examples-dependencies:
        patterns:
          - '*'
    labels:
      - dependencies
      - terraform

  - package-ecosystem: docker
    directories:
      - /.docker/pre-commit
      - /.docker/forge-github-app-register
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      docker-dependencies:
        patterns:
          - '*'
    ignore:
      - dependency-name: ubuntu
        update-types:
          - version-update:semver-major
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker-compose
    directory: /tests/smoke
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      docker-compose-dependencies:
        patterns:
          - '*'
    labels:
      - dependencies
      - docker

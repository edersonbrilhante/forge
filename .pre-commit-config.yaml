---
exclude: |
  (?x)^(
      .*\{\{.*\}\}.*|     # Exclude any files with cookiecutter variables
      \.history/.*|       # Exclude history files
      .*cache.*/.*|       # Exclude cache directories
      .*venv.*/.*|        # Exclude virtual environment directories
  )$
fail_fast: false
default_language_version:
  python: python3.12
default_install_hook_types:
  - pre-commit
  - commit-msg
repos:
  # ---------------------
  # General Hooks
  # ---------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-yaml
        name: YAML · Syntax check
        always_run: true
      - id: end-of-file-fixer
        name: Files · End-of-file fixer
        always_run: true
      - id: trailing-whitespace
        name: Whitespace · Trim trailing
        always_run: true
        args: [--markdown-linebreak-ext=md]
      - id: check-merge-conflict
        name: Git · Merge conflict markers
        always_run: true
      - id: check-added-large-files
        name: Git · Large file guard
        always_run: true
        exclude: (docs/img)
      - id: check-ast
        name: Python · Parse (AST)
        always_run: true
      - id: check-builtin-literals
        name: Python · Builtin literals
        always_run: true
      - id: check-json
        name: JSON · Syntax check
        always_run: true
      - id: check-toml
        name: TOML · Syntax check
        always_run: true
      - id: check-xml
        name: XML · Syntax check
        always_run: true
      - id: detect-private-key
        name: Security · Detect private keys
        always_run: true
      - id: mixed-line-ending
        name: Whitespace · Normalize line endings
        always_run: true
      - id: debug-statements
        name: Python · Debug statements
        always_run: true
      - id: name-tests-test
        name: Python · Test file naming
        always_run: true
      - id: destroyed-symlinks
        name: Git · Destroyed symlinks
        always_run: true
      - id: check-docstring-first
        name: Python · Docstring first
        always_run: true
      - id: check-case-conflict
        name: Git · Case conflict
        always_run: true
      - id: double-quote-string-fixer
        name: Python · Double quote fixer
        always_run: true
      - id: forbid-new-submodules
        name: Git · Forbid new submodules
        always_run: true

  # ---------------------
  # Commit Message Hooks
  # ---------------------
  - repo: https://github.com/commitizen-tools/commitizen
    rev: a6859a7b8182086a5e013deab8fefc0597b502e9  # frozen: v4.16.4
    hooks:
      - id: commitizen
        name: Git · Validate commit message
        stages: [commit-msg]
        always_run: true
        additional_dependencies: [cz-conventional-gitmoji]

  # ---------------------
  # YAML Hooks
  # ---------------------
  - repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
    rev: 8d1b9cadaf854cb25bb0b0f5870e1cc66a083d6b  # frozen: 0.2.3
    hooks:
      - id: yamlfmt
        name: YAML · Formatter
        always_run: true
        args: [--mapping, '2', --sequence, '4', --offset, '2', --width, '180']
        exclude: (build/ansible/|docs/operations/repo-blueprints/)

  - repo: https://github.com/adrienverge/yamllint
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530  # frozen: v1.38.0
    hooks:
      - id: yamllint
        name: YAML · Linter

  # ---------------------
  # Shell Hooks
  # ---------------------
  - repo: http://github.com/jumanjihouse/pre-commit-hooks
    rev: 38980559e3a605691d6579f96222c30778e5a69e  # frozen: 3.0.0
    hooks:
      - id: shellcheck
        name: Shell · Shellcheck
        files: \.sh$
      - id: shfmt
        name: Shell · Formatter
        args: [-i, '4', -w]
      - id: script-must-have-extension
        name: Shell · Must have extension

  - repo: https://github.com/openstack/bashate
    rev: 5798d24d571676fc407e81df574c1ef57b520f23  # frozen: 2.1.1
    hooks:
      - id: bashate
        name: Shell · Check shell script code style
        files: \.sh$

  # ---------------------
  # Docker Hooks
  # ---------------------
  - repo: https://github.com/hadolint/hadolint
    rev: 4e697ba704fd23b2409b947a319c19c3ee54d24f  # frozen: v2.14.0
    hooks:
      - id: hadolint
        name: Docker · Linter
        exclude: (docs/operations/repo-blueprints/)

  # ---------------------
  # Makefile Hooks
  # ---------------------
  - repo: https://github.com/mrtazz/checkmake.git
    rev: 59931d556f8f5cf4fbacf2c8390a8122ef7a881d  # frozen: v0.3.2
    hooks:
      - id: checkmake
        name: Makefile · Lint Makefile
        exclude: (docs/operations/repo-blueprints/)

  # ---------------------
  # Python Hooks
  # ---------------------
  - repo: https://github.com/hhatto/autopep8
    rev: 4046ad49e25b7fa1db275bf66b1b7d60600ac391  # frozen: v2.3.2
    hooks:
      - id: autopep8
        name: Python · autopep8

  - repo: https://github.com/PyCQA/isort
    rev: a333737ed43df02b18e6c95477ea1b285b3de15a  # frozen: 8.0.1
    hooks:
      - id: isort
        name: Python · Import sorter

  - repo: https://github.com/PyCQA/autoflake
    rev: 2d3853a9f31d97783fb2e181d41cd82a6babd666  # frozen: v2.3.3
    hooks:
      - id: autoflake
        name: Python · Remove unused imports

  - repo: https://github.com/PyCQA/flake8
    rev: d93590f5be797aabb60e3b09f2f52dddb02f349f  # frozen: 7.3.0
    hooks:
      - id: flake8
        name: Python · Linter
        args: [--ignore=E501]

  - repo: https://github.com/asottile/pyupgrade
    rev: 75992aaa40730136014f34227e0135f63fc951b4  # frozen: v3.21.2
    hooks:
      - id: pyupgrade
        name: Python · Upgrade syntax
        always_run: true

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: 4b2e70d08cb2ccd26d1fba73588de41c7a5d50b7  # frozen: v0.25
    hooks:
      - id: validate-pyproject
        name: Python · Validate pyproject.toml
        always_run: true
        additional_dependencies: ['validate-pyproject-schema-store[all]']

  # ---------------------
  # JSON Schema Hooks
  # ---------------------
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 1a4bb160cab6417b3045e1b37b6b72449243e658  # frozen: 0.37.4
    hooks:
      - id: check-github-workflows
        name: JSON Schema · GitHub workflows
      - id: check-github-actions
        name: JSON Schema · GitHub Actions
        args: [--verbose]
      - id: check-compose-spec
        name: JSON Schema · Docker Compose files
      - id: check-dependabot
        name: JSON Schema · Dependabot Config (v2)
      - id: check-renovate
        name: JSON Schema · Renovate

  # ---------------------
  # Terraform / IaC Hooks
  # ---------------------
  - repo: https://github.com/gruntwork-io/pre-commit
    rev: 40f924cd642f5dc98d12bd97b07f3752223553da  # frozen: v0.1.30
    hooks:
      - id: terragrunt-hcl-fmt
        name: Terraform/IaC · Terragrunt fmt
        always_run: true
      - id: tofu-fmt
        name: Terraform/IaC · Tofu fmt
        always_run: true
      - id: tofu-validate
        name: Terraform/IaC · Tofu validate
        always_run: true
      - id: packer-validate
        name: Terraform/IaC · Packer validate
        always_run: true
        exclude: (docs/operations/repo-blueprints/)

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: 05fd71a57a467ccf5598f7e836d3af4cf9225abb  # frozen: v1.108.0
    hooks:
      - id: terraform_fmt
        name: Terraform · Formatter
        always_run: true
        args: [--hook-config=--tf-path=tofu]
      - id: terraform_tflint
        name: Terraform · Linter
        always_run: true
        args:
          - --hook-config=--tf-path=tofu
          - --args=--disable-rule=terraform_required_providers
        exclude: (modules/helpers/forge_subscription|modules/integrations/splunk_secrets/|modules/integrations/splunk_cloud_s3_runner_logs/)
      - id: terraform_validate
        name: Terraform · Validate
        always_run: true
        args:
          - --hook-config=--retry-once-with-cleanup=true
          - --tf-init-args=-backend=false
          - --tf-init-args=--upgrade=true
          - --hook-config=--tf-path=tofu
        exclude: (modules/integrations/splunk_cloud_data_manager|modules/integrations/splunk_cloud_s3_runner_logs)

  # ---------------------
  # Security Hooks
  # ---------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e  # frozen: v8.30.1
    hooks:
      - id: gitleaks
        name: Security · Gitleaks
        entry: gitleaks detect --source . --config .gitleaks.toml --redact --verbose --no-git
        always_run: true
        pass_filenames: false

  - repo: https://github.com/PyCQA/bandit
    rev: 92ae8b82fb422a639f0ed8d99e96cea769594e08  # frozen: 1.9.4
    hooks:
      - id: bandit
        name: Security · Bandit
        args:
          - -q
          - -r
          - modules
          - tests
          - -x
          - '*/__pycache__/*,*/.terraform/*,*/.hypothesis/*,*/.pytest_cache/*'
          - -lll
          - -iii
        always_run: true
        pass_filenames: false

  - repo: https://github.com/pypa/pip-audit
    rev: 8894eb8cee033531a1fbd9f2fb160892531c14e3  # frozen: v2.10.1
    hooks:
      - id: pip-audit
        name: Security · pip-audit
        entry: >-
          bash -c 'set -euo pipefail; req="$(mktemp)";
          trap "rm -f \"$req\"" EXIT;
          uv export --project . --locked --only-group lambda-tests --format requirements-txt --no-hashes > "$req";
          pip-audit -r "$req" --strict --no-deps --disable-pip'
        additional_dependencies:
          - uv==0.11.26
        always_run: true
        pass_filenames: false

  # ---------------------
  # Ansible Hooks
  # ---------------------
  - repo: https://github.com/ansible-community/ansible-lint.git
    rev: 262624cd0ab22a4221293216856c59671ce7aa5e  # frozen: v26.6.0
    hooks:
      - id: ansible-lint
        name: Ansible · Linter
        always_run: true
        language_version: python3.12
        exclude: (docs/operations/repo-blueprints/)

  # ---------------------
  # Markdown Hooks
  # ---------------------
  - repo: https://github.com/hukkin/mdformat
    rev: 2d496dbc18e31b83a1596685347ffe0b6041daf0  # frozen: 1.0.0
    hooks:
      - id: mdformat
        name: Markdown · Format markdown
        additional_dependencies:
          - mdformat-gfm
          - mdformat-ruff
          - mdformat-frontmatter
          - ruff
        exclude: (modules/|CHANGELOG.md)

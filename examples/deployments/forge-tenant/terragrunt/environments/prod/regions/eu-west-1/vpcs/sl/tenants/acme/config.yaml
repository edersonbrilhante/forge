---
gh_config:
  ghes_url: ''
  ghes_org: cisco-open
  repository_selection: selected
  github_webhook_relay:
    enabled: false
  github_app:
    id: 1234567890
    client_id: abcdefghijklmnopqrstuvwx
    installation_id: 9876543210
    name: forge-github-app
tenant:
  iam_roles_to_assume:
    - arn:aws:iam::123456789012:role/role_for_forge_runners
  ecr_registries:
    - 123456789012.dkr.ecr.eu-west-1.amazonaws.com
  github_logs_reader_role_arns:
    - arn:aws:iam::123456789012:role/github_logs_reader
ec2_runner_specs:
  small:
    type: small
    ami_name: forge-gh-runner-amd64-v*
    ami_owner: '123456789012'
    ami_kms_key_arn: ''
    runner_os: linux
    runner_architecture: x64
    runner_user: ubuntu
    max_instances: 1
    instance_types:
      - t2.small
      - t2.medium
      - t2.large
      - t3.small
      - t3.medium
      - t3.large
    pool_config: []
    volume:
      size: 200
      device_name: /dev/sda1
      iops: 3000
      throughput: 125
      type: gp3
  small-arm:
    type: small
    ami_name: forge-gh-runner-arm64-v*
    ami_owner: '123456789012'
    ami_kms_key_arn: ''
    runner_os: linux
    runner_architecture: arm64
    runner_user: ubuntu
    max_instances: 1
    instance_types:
      - t4g.small
      - t4g.medium
      - t4g.large
    pool_config: []
    volume:
      size: 200
      device_name: /dev/sda1
      iops: 3000
      throughput: 125
      type: gp3
  mac:
    type: small
    ami_name: forge-gh-runner-macarm-v*
    ami_owner: '123456789012'
    ami_kms_key_arn: ''
    runner_os: osx
    runner_architecture: arm64
    runner_user: ec2-user
    placement:
      host_resource_group_arn: arn:aws:resource-groups:eu-west-1:123456789012:group/acme-mac-dedicated-hosts
      tenancy: host
      availability_zone: eu-west-1b
    license_specifications:
      - license_configuration_arn: arn:aws:license-manager:eu-west-1:123456789012:license-configuration:lic-0123456789abcdef0
    use_dedicated_host: true
    vpc_id: vpc-0abc1234def567890
    subnet_ids:
      - subnet-0abc1234def567890
      - subnet-0123456789abcdef0
    max_instances: 1
    instance_types:
      - mac2.metal
    pool_config: []
    volume:
      size: 200
      device_name: /dev/sda1
      iops: 3000
      throughput: 125
      type: gp3
arc_runner_specs:
  dependabot:
    runner_size:
      max_runners: 100
      min_runners: 1
    scale_set_name: dependabot
    scale_set_type: dind
    container_actions_runner: 123456789012.dkr.ecr.eu-west-1.amazonaws.com/actions-runner:latest
    container_requests_cpu: 500m
    container_requests_memory: 1Gi
    container_limits_cpu: '1'
    container_limits_memory: 2Gi
    volume_requests_storage_type: gp2
    volume_requests_storage_size: 10Gi
  k8s:
    runner_size:
      max_runners: 100
      min_runners: 1
    scale_set_name: k8s
    scale_set_type: k8s
    container_actions_runner: 123456789012.dkr.ecr.eu-west-1.amazonaws.com/actions-runner:latest
    container_requests_cpu: 500m
    container_requests_memory: 1Gi
    container_limits_cpu: '1'
    container_limits_memory: 2Gi
    volume_requests_storage_type: gp3
    volume_requests_storage_size: 10Gi
arc_cluster_name: forge-euw1-prod-green
migrate_arc_cluster: false

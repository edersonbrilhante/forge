---
gh_config:
  ghes_url: <GITHUB_URL>
  ghes_org: <GITHUB_ORG>
  repository_selection: <REPOSITORY_SELECTION>
  github_webhook_relay:
    enabled: <GITHUB_WEBHOOK_RELAY_ENABLED>
    destination_account_id: <DESTINATION_ACCOUNT_ID>
    destination_event_bus_name: <DESTINATION_EVENT_BUS_NAME>
    destination_region: <DESTINATION_REGION>
    destination_reader_role_arn: <DESTINATION_READER_ROLE_ARN>
  github_app:
    id: <GITHUB_APP_ID>
    client_id: <GITHUB_APP_CLIENT_ID>
    installation_id: <GITHUB_APP_INSTALLATION_ID>
    name: <GITHUB_APP_NAME>
tenant:
  iam_roles_to_assume:
    - arn:aws:iam::<ACCOUNT_ID>:role/<ROLE_NAME>
  ecr_registries:
    - <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com
  github_logs_reader_role_arns:
    - arn:aws:iam::<ACCOUNT_ID>:role/<ROLE_NAME>
ec2_runner_specs:
  <runner_type-alias>:
    type: <runner_type>
    enable_dynamic_labels: <ENABLE_DYNAMIC_LABELS>
    ec2_dynamic_labels_policy: <EC2_DYNAMIC_LABELS_POLICY>
    lambda_event_source_mapping_batch_size: <BATCH_SIZE>
    lambda_event_source_mapping_maximum_batching_window_in_seconds: <BATCHING_WINDOW_SECONDS>
    redrive_build_queue:
      enabled: <REDRIVE_ENABLED>
      maxReceiveCount: <MAX_RECEIVE_COUNT>
    ami_name: <AMI_NAME_PATTERN>
    ami_owner: <ACCOUNT_ID>
    ami_kms_key_arn: <KMS_ARN>
    runner_os: <OS>
    runner_architecture: <ARCH>
    runner_user: <RUNNER_USER>
    placement:
      host_resource_group_arn: <HOST_RESOURCE_GROUP_ARN>
      tenancy: host
      availability_zone: <AVAILABILITY_ZONE>
    max_instances: <MAX_PARALLEL>
    license_specifications: <LICENSE_SPECIFICATIONS>
    use_dedicated_host: <USE_DEDICATED_HOST>
    vpc_id: <VPC_ID>
    subnet_ids:
      - <SUBNET_ID>
    instance_types:
      - <AWS_INSTANCE_TYPE>
    pool_config:
      - size: <RUNNERS_STARTING_SIZE>
        schedule_expression: <CRON_EXPRESSION>
        schedule_expression_timezone: <TIMEZONE>
    volume:
      size: <VOLUME_SIZE>
      device_name: <VOLUME_DEVICE_NAME>
      iops: <VOLUME_IOPS>
      throughput: <VOLUME_THROUGHPUT>
      type: <VOLUME_TYPE>
arc_runner_specs:
  <runner_type>:
    runner_size:
      max_runners: <MAX>
      min_runners: <MIN>
    scale_set_name: <NAME>
    scale_set_type: <TYPE>
    container_images:
      actions_runner: ghcr.io/actions/actions-runner:latest
      busybox: public.ecr.aws/docker/library/busybox:stable
      dind_rootless: public.ecr.aws/docker/library/docker:dind-rootless
    container_requests_cpu: <CPU>
    container_requests_memory: <MEM>
    container_limits_cpu: <CPU>
    container_limits_memory: <MEM>
    volume_requests_storage_type: <STORAGE_TYPE>
    volume_requests_storage_size: <STORAGE_SIZE>
arc_cluster_name: <CLUSTER_NAME>
migrate_arc_cluster: <MIGRATE_ARC_CLUSTER>

---
- name: Build GitHub runner base image
  hosts: all
  gather_facts: true
  become: true
  pre_tasks:
    - name: Wait for cloud-init to complete
      ansible.builtin.command: /usr/bin/cloud-init status --wait
      changed_when: false

    - name: Wait for apt background jobs
      ansible.builtin.command: >
        systemd-run
        --property=After=apt-daily.service apt-daily-upgrade.service
        --wait /bin/true
      changed_when: false

  roles:
    - role: deps

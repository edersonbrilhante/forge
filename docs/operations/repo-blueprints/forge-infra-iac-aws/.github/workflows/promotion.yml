---
# yamllint disable rule:comments
# yamllint disable rule:truthy
name: Infra promotion

on:
  push:
    branches:
      - main
    paths:
      - release_versions.yml
      - terraform/**
  workflow_dispatch:

permissions: {}

concurrency:
  group: forge-infra-promotion
  cancel-in-progress: false

jobs:
  storage:
    name: Apply storage helpers
    runs-on: k8s
    permissions:
      contents: read # Required to checkout repository content.
      id-token: write # Required to assume the AWS deployment role through OIDC.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/terragrunt-deployment-action
        with:
          aws-region: eu-west-1
          aws-account-id: '000000000000'
          aws-profile: forge-ops-prod
          role-name: owner
          tf-target-env: prod
          tf-path: terraform/environments/prod/helpers/storage
          run-apply: 'true'

  regional:
    name: Apply regional units
    needs: storage
    runs-on: k8s
    permissions:
      contents: read # Required to checkout repository content.
      id-token: write # Required to assume the AWS deployment role through OIDC.
    strategy:
      fail-fast: false
      matrix:
        unit:
          - terraform/environments/prod/regions/eu-west-1/ecr
          - terraform/environments/prod/regions/eu-west-1/eks
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/terragrunt-deployment-action
        with:
          aws-region: eu-west-1
          aws-account-id: '000000000000'
          aws-profile: forge-ops-prod
          role-name: owner
          tf-target-env: prod
          tf-path: ${{ matrix.unit }}
          run-apply: 'true'

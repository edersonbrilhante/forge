---
# yamllint disable rule:comments
# yamllint disable rule:truthy
name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: 0 */4 * * *

permissions: {}

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    name: Run Renovate
    runs-on: k8s
    permissions:
      contents: read # Required to checkout repository content.
      id-token: write # Required to assume the AWS Renovate role through OIDC.
      pull-requests: write # Required for Renovate to create and update dependency PRs.
      issues: write # Required for Renovate dashboard and issue updates.
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
      LOG_FILE: /tmp/renovate-logs/renovate.log
      LOG_FILE_FORMAT: json
      LOG_FILE_LEVEL: debug
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Prepare logs
        shell: bash
        run: install -d -m 755 "${RUNNER_TEMP}/renovate-logs"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6.2.3
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Run Renovate
        uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        with:
          configurationFile: config/default.json
          env-regex: '^(AWS_|LOG_FILE|LOG_FILE_FORMAT|LOG_FILE_LEVEL)'
          docker-volumes: |
            ${{ runner.temp }}/renovate-logs:/tmp/renovate-logs

      - name: Upload Renovate logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: renovate-logs
          path: ${{ runner.temp }}/renovate-logs
          if-no-files-found: ignore

---
# yamllint disable rule:comments
name: Terragrunt Deployment Action
description: Composite action to run Terragrunt Deployment Action
inputs:
  aws-region:
    description: AWS region
    required: true
  aws-account-id:
    description: AWS account ID
    required: true
  aws-profile:
    description: AWS profile
    required: true
  role-name:
    description: Role name
    required: true
  tf-target-env:
    description: Terragrunt target environment
    required: true
  tf-path:
    description: Terragrunt path
    required: true
  run-apply:
    description: Run Terragrunt apply?
    required: false
  tf-refresh:
    description: Run Terragrunt refresh?
    required: false
    default: 'true'
  create-lock:
    description: Create lock
    required: false
    default: 'true'
  github-app-token-repositories:
    description: Repositories the automation GitHub App token can access. Defaults to the current repository.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Checkout Repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Create Lock
      id: create-lock
      if: ${{ inputs.create-lock == 'true' }}
      uses: ./.github/actions/global-lock-action
      with:
        lock-action: acquire
        lock-id: forge_terraform_${{ inputs.tf-path }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
      with:
        role-to-assume: arn:aws:iam::${{ inputs.aws-account-id }}:role/${{ inputs.role-name }}
        aws-region: ${{ inputs.aws-region }}
        role-skip-session-tagging: true

    - name: Retrieve Secrets from AWS Secrets Manager
      uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
      with:
        secret-ids: |
          GITHUB_APP_AUTOMATION,/cicd/common/github_app_automation
        parse-json-secrets: true

    - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      id: app-token
      with:
        client-id: ${{ env.GITHUB_APP_AUTOMATION_CLIENT_ID }}
        private-key: ${{ env.GITHUB_APP_AUTOMATION_PEM }}
        owner: ${{ github.repository_owner }}
        repositories: ${{ inputs.github-app-token-repositories || github.event.repository.name }}
        permission-contents: read

    - name: Setup custom credential helper
      env:
        GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      shell: bash
      run: |
        echo '#!/bin/bash' > /tmp/creds.sh;
        echo "echo username=oauth2" >> /tmp/creds.sh;
        echo "echo password=$GITHUB_TOKEN" >> /tmp/creds.sh;
        git config --global credential.helper "/bin/bash /tmp/creds.sh"
        git config --global --add url."https://github.com/".insteadOf "git@github.com:"
        git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
        cat ~/.gitconfig

    - name: Execute Terragrunt Plan
      if: ${{ inputs.run-apply == 'false' }}
      shell: bash
      id: plan
      env:
        TG_TF_PATH: tofu
        TF_DANGEROUS: '1'
        TF_TARGET_ENV: ${{ inputs.tf-target-env }}
        AWS_ACCESS_KEY_ID: ''
        AWS_SECRET_ACCESS_KEY: ''
        AWS_SESSION_TOKEN: ''
        TF_PATH: ${{ inputs.tf-path }}
        TG_NO_COLOR: true
        TG_TF_FORWARD_STDOUT: true
        TF_REFRESH: ${{ inputs.tf-refresh }}
      run: |
        pushd "$TF_PATH"
        terragrunt plan -refresh="$TF_REFRESH" -out $(pwd)/.planfile
        echo "planfile=$(pwd)/.planfile" >> $GITHUB_OUTPUT
        popd

    - name: Comment Terragrunt Plan on PR
      uses: ./.github/actions/terragrunt-plan-comment-action
      if: ${{ inputs.run-apply == 'false' }}
      env:
        TG_NO_COLOR: true
        TG_TF_FORWARD_STDOUT: true
      with:
        planfile: ${{ steps.plan.outputs.planfile }}
        working-directory: ${{ inputs.tf-path }}
        skip-empty: true
        skip-comment: false

    - name: Execute Terragrunt Apply
      if: ${{ inputs.run-apply == 'true' }}
      shell: bash
      env:
        TG_TF_PATH: tofu
        TF_DANGEROUS: '1'
        TF_TARGET_ENV: ${{ inputs.tf-target-env }}
        AWS_ACCESS_KEY_ID: ''
        AWS_SECRET_ACCESS_KEY: ''
        AWS_SESSION_TOKEN: ''
        TF_PATH: ${{ inputs.tf-path }}
        TG_TF_FORWARD_STDOUT: true
        TF_REFRESH: ${{ inputs.tf-refresh }}
      run: |
        pushd "$TF_PATH"
        terragrunt apply -auto-approve -refresh="$TF_REFRESH"  --non-interactive
        popd

    - name: Release Lock
      id: release-lock
      if: ${{ always() && inputs.create-lock == 'true' }}
      uses: ./.github/actions/global-lock-action
      with:
        lock-action: release
        lock-id: forge_terraform_${{ inputs.tf-path }}

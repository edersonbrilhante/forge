---
# yamllint disable rule:comments
# yamllint disable rule:truthy
name: Promotion

on:
  push:
    branches:
      - main
    paths:
      - release_versions.yml
      - terraform/**
  workflow_dispatch:

permissions: {}

concurrency:
  group: tenants-promotion
  cancel-in-progress: false

jobs:
  apply:
    uses: ./.github/workflows/rw-terragrunt.yml
    permissions:
      contents: read # Required to checkout repository content.
      pull-requests: write # Required when the called Terragrunt workflow posts plan comments.
    with:
      aws-region: eu-west-1
      aws-account-id: '000000000000'
      aws-profile: forge-ops-prod
      role-name: owner
      tf-target-env: prod
      env: prod
      run-apply: 'true'
